<!DOCTYPE html>
<html>
<head>
    <title>my Movie reviews</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 30px;
            color: #111;
            background-color: #111;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid #ddd;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #f2f9e8;
        }

        h1 span {
            color: #fff978
        }

        .add-link {
            color: #f2f9e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .add-link:hover {
            color: #fff978;
        }

        .review-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            margin-top: 35px;
        }

        .review-card {
            background-color: #fff;
            padding: 18px;
            border-radius: 20px;
        }

        .review-card:hover {
            background-color: #f2f9e8;
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        }

        .poster {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #ddd;
            margin-bottom: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #777;
            font-size: 14px;
            border-radius: 10px;
        }

        .review-title {
            display: block;
            margin-bottom: 16px;
            color: #111;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }

        .review-title:hover {
        }

        .review-info {
            margin: 8px 0;
            font-size: 14px;
            color: #333;
        }

        .empty {
            margin-top: 40px;
            text-align: center;
            color: #777;
            
        }
    </style>
</head>
<body>
    <header>
        <h1>my<span>Movie</span>reviews</h1>
        <a href="{% url 'review-create' %}" class="add-link">리뷰 작성</a>
    </header>

    {% if reviews %}
    <div class="review-container">
        {% for review in reviews %}
        <div class="review-card">
            {% if review.image %}
                <img src="{{ review.image.url }}" alt="{{ review.title }}" class="poster">
            {% else %}
                <div class="poster">No Image</div>
            {% endif %}

            <a href="{% url 'review-detail' review.pk %}" class="review-title">
                {{ review.title }}
            </a>

            <p class="review-info">개봉년도: {{ review.release_year }}년</p>
            <p class="review-info">장르: {{ review.genre }}</p>
            <p class="review-info">별점: {{ review.rating }}</p>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="empty">작성된 리뷰가 없습니다.</p>
    {% endif %}
</body>
</html>
