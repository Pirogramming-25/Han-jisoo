<!DOCTYPE html>
<html>
<head>
    <title>삭제 확인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 30px;
            color: #f5f5f5;
            background-color: #111;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid #777;
        }

        .logo {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        .logo span {
            color: #f4ee5a;
        }

        .logo-link {
            text-decoration: none;
            color: #f5f5f5;
        }

        .delete-box {
            width: 520px;
            margin: 80px auto 0;
            padding: 40px;
            background-color: #f4ffdf;
            color: #111;
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .delete-box h1 {
            margin: 0 0 20px;
            font-size: 26px;
        }

        .delete-box p {
            margin-bottom: 32px;
            font-size: 16px;
            line-height: 1.6;
        }

        .movie-title {
            font-weight: 700;
            color: #111;
        }

        .btn-area {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
        }

        .btn-delete {
            background-color: #e53935;
            color: white;
        }

        .btn-delete:hover {
            background-color: #c62828;
        }

        .btn-back {
            background-color: #111;
            color: white;
        }

        .btn-back:hover {
            color: #fff978;
            border-color: #f4ffdf;
        }
    </style>
</head>
<body>
    <h1>정말 삭제하시겠습니까?</h1>
    <p>"{{ review.title }}"을(를) 삭제합니다.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">삭제</button>
        <a href="{% url 'review-detail' review.pk %}" class="btn btn-back">취소</a>
    </form>
</body>
</html>
