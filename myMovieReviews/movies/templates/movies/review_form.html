<!DOCTYPE html>
<html>
<head>
    <title>{% if review %}리뷰 수정{% else %}리뷰 작성{% endif %}</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px 30px;
        color: #111;
        background-color: #111;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 24px;
        border-bottom: 1px solid #ddd;
    }

    .logo {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: #f2f9e8;
    }

    .logo span {
        color: #fff978;
        font-weight: 700;
    }

    .add-link {
        color: #f2f9e8;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
    }

    .add-link:hover {
        color: #fff978;
    }

    .form-wrap {
        width: 560px;
        margin: 40px auto 0;
        padding: 35px 55px;
        background-color: #f2f2f2;
        border-radius: 20px;
    }

    .form-title {
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        margin: 0 0 30px;
        padding-bottom: 0px;
        padding-top: 30px;
        border-bottom: none;
        color: #f2f9e8;
    }

    .form-title span {
        color: #fff978;
        font-weight: 700;
    }

    .form-row {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 7px;
        font-size: 14px;
        font-weight: 700;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 9px 10px;
        border: 1px solid #5e5b5b;
        border-radius: 15px;
        box-sizing: border-box;
        font-size: 14px;
        font-family: Arial, sans-serif;
        background-color: #fff;
    }

    input[type="file"] {
        border: none;
        padding-left: 0;
        background-color: transparent;
    }

    textarea {
        height: 140px;
        resize: vertical;
    }

    .btn-area {
        display: flex;
        justify-content: flex-end;
        margin-top: 25px;
    }

    .btn-save {
        padding: 10px 26px;
        border-radius: 10px;
        border: none;
        background-color: #fff;
        color: #111;
        font-size: 14px;
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(244, 255, 223, 0.18);
    }

    .btn-save:hover {
        background-color: #fff;
        border-color: #111;
        color: #111;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }
</style>
</head>
<body>
    <header>
        <a href="{% url 'review-list' %}" style="text-decoration: none; color: #111;">
            <h1 class="logo">my<span>Movie</span>reviews</h1>
        </a>
        <a href="{% url 'review-create' %}" class="add-link">Add a New review</a>
    </header>


    <h2 class="form-title">
            <span>Movie</span> review
        </h2>
    <div class="form-wrap">
        

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-row">
                <label>제목: </label>
                <input type="text" name="title" class="medium" value='{{ review.title|default:""}}' required>
            </div>

            <div class="form-row">
                <label>개봉년도:</label>
                <input type="number" name="release_year" class="short" value='{{ review.release_year|default:""}}' required>
            </div>

            <div class="form-row">
                <label>장르:</label>
                <select name="genre" required>
                    <option value="">---------</option>
                    <option value="Action" {% if review.genre == "Action" %}selected{% endif %}>Action</option>
                    <option value="Comedy" {% if review.genre == "Comedy" %}selected{% endif %}>Comedy</option>
                    <option value="Romance" {% if review.genre == "Romance" %}selected{% endif %}>Romance</option>
                    <option value="SF" {% if review.genre == "SF" %}selected{% endif %}>SF</option>
                    <option value="Thriller" {% if review.genre == "Thriller" %}selected{% endif %}>Thriller</option>
                    <option value="Animation" {% if review.genre == "Animation" %}selected{% endif %}>Animation</option>
                    <option value="Drama" {% if review.genre == "Drama" %}selected{% endif %}>Drama</option>
                    <option value="History" {% if review.genre == "History" %}selected{% endif %}>History</option>
                </select>
            </div>

            <div class="form-row">
                <label>별점:</label>
                <input type="number" name="rating" class="short" step="0.5" min="0" max="5" value='{{ review.rating|default:"" }}' required>
            </div>

            <div class="form-row">
                <label>러닝타임:</label>
                <input type="number" name="running_time" class="short" value='{{ review.running_time|default:"" }}' required>
            </div>

            <div class="form-row">
                <label>감독:</label>
                <input type="text" name="director" class="medium" value='{{ review.director|default:"" }}' required>
            </div>

            <div class="form-row">
                <label>주연:</label>
                <input type="text" name="actor" class="medium" value='{{ review.actor|default:"" }}' required>
            </div>

            <div class="form-row textarea-row">
                <label>리뷰:</label>
                <textarea name="content" required>{{ review.content|default:"" }}</textarea>
            </div>

            <div class="form-row">
                <label>이미지:</label>
                <input type="file" name="image">
            </div>
            <div class="btn-area">
                <button type="submit" class="btn-save">Save</button>
            </div>
            
        </form>
    </div>
</body>
</html>
