<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>개발툴 등록</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            color: #222;
        }

        .navbar {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #1f245c;
            text-decoration: none;
        }

        .nav-links a {
            margin-left: 24px;
            color: #444;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-links a:hover {
            color: #1e90ff;
        }

        .container {
            max-width: 760px;
            margin: 56px auto;
            padding: 0 24px;
        }

        .form-card {
            background: white;
            border-radius: 24px;
            padding: 44px 52px;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.08);
        }

        .form-header {
            margin-bottom: 34px;
            text-align: center;
        }

        .form-header h1 {
            margin: 0 0 10px;
            font-size: 34px;
            color: #222;
        }

        .form-header p {
            margin: 0;
            color: #777;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 9px;
            font-weight: 800;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 14px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
            background: #fff;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #157dec;
        }

        .form-group textarea {
            min-height: 160px;
            resize: vertical;
        }

        .button-row {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 36px;
        }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 13px 22px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-save {
            background: #157dec;
            color: white;
        }

        .btn-save:hover {
            background: #1e90ff;
            box-shadow: 0 8px 20px rgba(63, 62, 157, 0.35);
        }

        .btn-cancel {
            background: #f1f1f5;
            color: #555;
        }

        .btn-cancel:hover {
            background: #e5e7eb;
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 0 20px;
            }

            .nav-links a {
                margin-left: 10px;
                font-size: 12px;
            }

            .container {
                margin: 32px auto;
            }

            .form-card {
                padding: 30px 24px;
            }

            .form-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'idea-list' %}" class="logo">My SW Idea Manage</a>

        <div class="nav-links">
            <a href="{% url 'idea-create' %}">아이디어 등록</a>
            <a href="{% url 'idea-manage' %}">아이디어 관리</a>
            <a href="{% url 'devtool-add' %}">개발툴 등록</a>
            <a href="{% url 'devtool-manage' %}">개발툴 관리</a>
        </div>
    </nav>

    <main class="container">
        <section class="form-card">
            <div class="form-header">
                {% if devtool %}
                    <h1>개발툴 수정</h1>
                    <p>등록한 개발툴 정보를 수정해보세요.</p>
                {% else %}
                    <h1>개발툴 등록</h1>
                    <p>아이디어 구현에 사용할 개발툴 정보를 등록해보세요.</p>
                {% endif %}
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="name">개발툴 이름</label>
                    <input
                        type="text"
                        name="name"
                        id="name"
                        value="{{ devtool.name }}"
                        placeholder="예: Django"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="kind">개발툴 종류</label>
                    <input
                        type="text"
                        name="kind"
                        id="kind"
                        value="{{ devtool.kind }}"
                        placeholder="예: 웹 프레임워크, 라이브러리, 프로그래밍 언어"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="content">개발툴 설명</label>
                    <textarea
                        name="content"
                        id="content"
                        placeholder="개발툴에 대한 설명을 입력하세요."
                        required
                    >{{ devtool.content }}</textarea>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn btn-save">
                        {% if devtool %}수정{% else %}등록{% endif %}
                    </button>
                    <a href="{% url 'devtool-manage' %}" class="btn btn-cancel">취소</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
