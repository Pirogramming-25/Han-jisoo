{% load static %}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ story_user.username }}님의 스토리</title>
    <link rel="stylesheet" href="{% static 'css/story-detail.css' %}">
</head>
<body>
    <div class="story-container">
    <h2>{{ story_user.username }}님의 스토리</h2>

    {% if stories %}
        {% for story in stories %}
        <div class="story-card">
            <img src="{{ story.image.url }}" alt="스토리 이미지">
        </div>
        {% endfor %}
    {% else %}
        <p>아직 올라온 스토리가 없습니다.</p>
    {% endif %}

    <a href="{% url 'posts:user_feed' %}" class="back-link">메인으로 돌아가기</a>
    </div>
</body>
</html>
